name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Vite app
        run: npm run build

      - name: Prepare deployment structure
        run: |
          # Create deployment directory
          mkdir -p deploy-dist/switchy

          # Copy root-level static files
          cp public-root/CNAME deploy-dist/
          cp public-root/.nojekyll deploy-dist/
          cp public-root/index.html deploy-dist/
          cp public-root/404.html deploy-dist/
          cp public-root/robots.txt deploy-dist/
          cp public-root/sitemap.xml deploy-dist/
          cp public-root/llms.txt deploy-dist/
          cp public-root/google7a8a921fc93f98b8.html deploy-dist/
          cp public-root/11e6eddaf51420669ed293a8c2ced8d7.txt deploy-dist/

          # Move built Vite app to /switchy/ subfolder
          cp -r dist/* deploy-dist/switchy/

          # Copy appcast
          cp switchy/appcast.xml deploy-dist/switchy/appcast.xml

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'deploy-dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # Notify Bing/Yandex (and anyone else on IndexNow) that pages changed.
      # Key file is served at https://mangobuns.com/11e6eddaf51420669ed293a8c2ced8d7.txt
      - name: Ping IndexNow
        continue-on-error: true
        run: |
          curl -s -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d '{
              "host": "mangobuns.com",
              "key": "11e6eddaf51420669ed293a8c2ced8d7",
              "urlList": [
                "https://mangobuns.com/",
                "https://mangobuns.com/switchy/",
                "https://mangobuns.com/switchy/compare/",
                "https://mangobuns.com/switchy/blog/",
                "https://mangobuns.com/switchy/blog/how-to-switch-magic-keyboard-between-macs/",
                "https://mangobuns.com/switchy/blog/universal-control-vs-switching-devices/",
                "https://mangobuns.com/switchy/blog/kvm-switch-for-two-macs/",
                "https://mangobuns.com/switchy/blog/one-keyboard-mouse-mac-mini-macbook/",
                "https://mangobuns.com/switchy/blog/magic-keyboard-pairing-mode/",
                "https://mangobuns.com/switchy/blog/magic-keyboard-multiple-devices/",
                "https://mangobuns.com/switchy/privacy/"
              ]
            }'
